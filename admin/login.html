<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Victory Fashion Designers</title>
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card fade-in">
            <div class="login-header">
                <div class="login-logo">🛍️</div>
                <h1 class="login-title">VFD Admin</h1>
                <p class="login-subtitle">Victory Fashion Designers</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="password">Admin Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-control" 
                        placeholder="Enter admin password"
                        required
                    >
                </div>

                <div id="error-message" style="color: var(--danger); margin-bottom: 1rem; display: none; text-align: center; font-size: 0.875rem;"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                    <span id="login-text">Login to Dashboard</span>
                    <svg id="login-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none; animation: spin 1s linear infinite;">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                </button>
            </form>

            <div style="margin-top: var(--space-xl); text-align: center; color: var(--text-secondary); font-size: 0.813rem;">
                <p>Protected Area - Authorized Access Only</p>
                <p style="margin-top: 0.5rem;">© 2026 Victory Fashion Designers</p>
            </div>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>

    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
