        <main class="main-content">
            <header class="top-header">
                <div class="header-left"><h1>Analytics & Reports</h1><p class="header-subtitle">Detailed sales analytics and business insights</p></div>
                <div class="header-right"><div class="header-actions"><button class="icon-btn" onclick="toggleTheme()"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg></button></div></div>
            </header>

            <div class="page-content">
                <div style="margin-bottom: var(--space-xl); display: flex; gap: var(--space-md); flex-wrap: wrap;">
                    <select id="period-filter" onchange="updateCharts()" style="padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-primary);">
                        <option value="7">Last 7 Days</option>
                        <option value="30">Last 30 Days</option>
                        <option value="90">Last 90 Days</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-xl); margin-bottom: var(--space-xl);">
                    <div class="card"><div class="card-header"><h2 class="card-title">Sales Trend</h2></div><canvas id="salesChart" height="80"></canvas></div>
                    <div class="card"><div class="card-header"><h2 class="card-title">Top Categories</h2></div><canvas id="categoriesChart"></canvas></div>
                </div>

                <div class="card">
                    <div class="card-header"><h2 class="card-title">Sales Summary</h2></div>
                    <div id="summary-content" style="padding: var(--space-lg); text-align: center; color: var(--text-secondary);">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">📊</div>
                        <p>Analytics data will populate once you have orders</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
        requireAuth();
        async function updateCharts() {
            const days = parseInt(document.getElementById('period-filter').value);
            const { data } = await supabaseClient.from('orders').select('total, created_at, status').gte('created_at', new Date(Date.now() - days * 86400000).toISOString());
            
            if (!data || data.length === 0) {
                document.getElementById('summary-content').innerHTML = '<div style="font-size: 3rem; margin-bottom: 1rem;">📊</div><p>No orders yet. Analytics will show once you have sales data.</p>';
                return;
            }

            const salesByDay = {};
            data.forEach(o => {
                const day = o.created_at.split('T')[0];
                salesByDay[day] = (salesByDay[day] || 0) + parseFloat(o.total);
            });

            new Chart(document.getElementById('salesChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(salesByDay),
                    datasets: [{
                        label: 'Sales (KSh)',
                        data: Object.values(salesByDay),
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });

            const totalSales = data.reduce((sum, o) => sum + parseFloat(o.total), 0);
            const completedOrders = data.filter(o => o.status === 'completed').length;
            document.getElementById('summary-content').innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-lg); text-align: center;">
                    <div><div style="font-size: 2rem; font-weight: 700; color: var(--primary);">KSh ${totalSales.toLocaleString()}</div><div style="color: var(--text-secondary);">Total Revenue</div></div>
                    <div><div style="font-size: 2rem; font-weight: 700; color: var(--success);">${data.length}</div><div style="color: var(--text-secondary);">Total Orders</div></div>
                    <div><div style="font-size: 2rem; font-weight: 700; color: var(--warning);">${completedOrders}</div><div style="color: var(--text-secondary);">Completed Orders</div></div>
                </div>
            `;
        }
        document.addEventListener('DOMContentLoaded', updateCharts);
    </script>
